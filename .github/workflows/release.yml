name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  GO_VERSION: "1.24"
  NFPM_VERSION: "2.41.1"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            goarm: ""
            deb_arch: amd64
            binary_suffix: amd64
          - goos: linux
            goarch: arm64
            goarm: ""
            deb_arch: arm64
            binary_suffix: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            deb_arch: armhf
            binary_suffix: armv7
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        run: |
          mkdir -p build
          VERSION=${GITHUB_REF_NAME#v}
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
            go build -ldflags "-s -w -X main.version=${VERSION}" \
            -o build/cm-linux-${{ matrix.binary_suffix }} ./cmd/cm

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v${{ env.NFPM_VERSION }}

      - name: Build .deb package
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          cp "build/cm-linux-$NFPM_BINARY_SUFFIX" build/cm
          nfpm package --packager deb --target build/
        env:
          ARCH: ${{ matrix.deb_arch }}
          NFPM_BINARY_SUFFIX: ${{ matrix.binary_suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.deb_arch }}
          path: build/*.deb

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: artifacts/*.deb
          generate_release_notes: true
